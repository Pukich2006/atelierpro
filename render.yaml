services:
  - type: web
    name: atelierpro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atelierpro_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: atelierpro_db
    databaseName: atelierpro
    user: atelierpro_user